<div class="w-full">
  <mat-radio-group class="grid grid-cols-2 gap-4" [value]="cartService.selectedDM()?.id" (change)="updateDeliveryMethod($event.value)" >
    @for (dm of checkoutService.deliveryMethods(); track dm.id) {
      <label class="p-3 border border-gray-200 cursor-pointer w-full hover:bg-purple-50">
        <mat-radio-button class="w-full h-full" [value]="dm" [checked]="dm.id === cartService.selectedDM()?.id">
          <div class="flex flex-col w-full h-full">
            <strong>{{ dm.shortName }} - {{ dm.price | currency : 'SAR' }}</strong>
            <span class="text-sm">{{ dm.description }}</span>
          </div>
        </mat-radio-button>
      </label>
    }
  </mat-radio-group>
</div>

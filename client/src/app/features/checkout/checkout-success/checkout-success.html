<section class="bg-white py-16 w-full">
    <div class="mx-auto max-w-2xl px-4">
        <h2 class="font-semibold text-2xl mb-2">Thanks for your order!</h2>
        <p class="text-gray-500 mb-2">Your order Id <span class="font-medium">#42</span></p>
        <div class="space-y-2 rounded-lg border •border-gray-100 •bg-gray-50 p-6 mb-8">
            <dl class="flex items-center justify-between gap-4">
                <dt class="font-normal text-gray-500">Date</dt>
                <dd class="font-medium text-gray-900 text-end">{{shippingDate() | date}}</dd>
            </dl>
            <dl class="flex items-center justify-between gap-4">
                <dt class="font-normal text-gray-500">Address</dt>
                <dd class="font-medium text-gray-900 text-end">{{accountService.currentUser()?.address?.line1}}</dd>
            </dl>
        </div>
        <div class="flex items-center gap-4">
            <button mat-flat-button routerLink="/orders/42"> View your order </button>
            <button mat-stroked-button routerLink="/shop"> Continue Shopping </button>
        </div>
    </div>
</section>

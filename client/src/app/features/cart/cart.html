@if ( !cartService || cartService.cartItemsCount() < 1) {
    <app-empty-card></app-empty-card>
}
@else {   
    <div class="grid md:grid-cols-7 m-2 gap-2">
        <div class="md:col-span-5 mx-3">
            @for (item of cartService.cart()?.items; track item.productId) {
                <app-shop-cart-item [cartItem]="item" class=""></app-shop-cart-item>
            }
        </div>
        <div class=" md:col-span-2">
            <h3 class="text-lg font-bold border-b-2 border-gray-400 my-2"> Order Summary </h3>
            <app-order-summary></app-order-summary>
        </div>
    </div>
}
